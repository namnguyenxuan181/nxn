server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    location /api/ {
        proxy_pass         http://ai_platform:8000;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout 120s;
    }
}

server {
    listen 9002;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;

    # Static assets: browser cache 7 days
    location ~* \.(js|css|png|svg|ico|woff2?|jpg|jpeg|gif|webp)$ {
        proxy_pass          http://minio:9001;
        proxy_set_header    Host        $http_host;
        proxy_hide_header   X-Frame-Options;
        proxy_hide_header   Content-Security-Policy;
        add_header          Cache-Control "public, max-age=604800, immutable";
        proxy_read_timeout  60s;
    }

    # WebSocket for real-time bucket browsing (/ws/objectManager, etc.)
    location /ws/ {
        proxy_pass              http://minio:9001/ws/;
        proxy_set_header        Host        $http_host;
        proxy_set_header        Upgrade     $http_upgrade;
        proxy_set_header        Connection  "upgrade";
        proxy_set_header        Origin      $http_origin;
        proxy_hide_header       X-Frame-Options;
        proxy_read_timeout      3600s;
        proxy_buffering         off;
    }

    # API & dynamic routes
    location / {
        proxy_pass              http://minio:9001/;
        proxy_set_header        Host              $http_host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version      1.1;
        proxy_hide_header       X-Frame-Options;
        proxy_hide_header       Content-Security-Policy;
        proxy_read_timeout      120s;
    }
}
