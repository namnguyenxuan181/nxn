# NXN Data + AI Platform
# Khởi động: cp .env.example .env && docker compose up -d
# UI:
#   MinIO      → http://localhost:9001  (minioadmin / minioadmin)
#   Trino      → http://localhost:8080
#   Nessie     → http://localhost:19120
#   Keycloak   → http://localhost:8090  (admin / admin)
#   OPA        → http://localhost:8181
#   Airflow    → http://localhost:8082  (admin / admin)
#   Superset   → http://localhost:8088  (OAuth via Keycloak)
#   AI Platform→ http://localhost:8300
#   ChromaDB   → http://localhost:8200
#
# Test users (Keycloak realm nxn):
#   admin / admin   → full access
#   alice / alice   → analyst (mart read-only, AI reports)
#   bob   / bob     → ai_user (chat only)
#   carol / carol   → data_engineer (raw + mart read/write)

services:

  # ── 1. Object Storage ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: nxn-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9002"
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: nxn-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/warehouse;
        echo 'Bucket warehouse ready';
      "

  # ── 2. Iceberg Catalog (Nessie REST) ─────────────────────
  nessie:
    image: projectnessie/nessie:latest
    container_name: nxn-nessie
    restart: unless-stopped
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: "19120"
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      NESSIE_STORE_ROCKS_DB_PATH: /nessie/rocksdb
    volumes:
      - nessie_data:/nessie/rocksdb
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:19120/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 3. Auth — Keycloak IdP ───────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nxn-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    command: start-dev --import-realm
    ports:
      - "8090:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-nxn.json:/opt/keycloak/data/import/realm-nxn.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── 3b. Auth — OPA policy engine ─────────────────────────
  opa:
    image: openpolicyagent/opa:latest-debug
    container_name: nxn-opa
    restart: unless-stopped
    command: run --server --addr=0.0.0.0:8181 /policies
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 4. Query Engine ──────────────────────────────────────
  trino:
    image: trinodb/trino:438
    container_name: nxn-trino
    restart: unless-stopped
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
      opa:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/config/access-control.properties:/etc/trino/access-control.properties
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx4G"

  # ── 5. ETL Orchestration ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nxn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow:
    build: ./airflow
    container_name: nxn-airflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__SECRET_KEY: nxn-airflow-secret
      AIRFLOW__WEBSERVER__X_FRAME_ENABLED: "True"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_PASSWORD:-admin}
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      DATA_DIR: /opt/nxn/data
      AIRFLOW_CONN_TRINO_DEFAULT: "trino://admin@trino:8080/iceberg"
    command: >
      bash -c "
        airflow db migrate &&
        airflow connections add trino_default
          --conn-type trino --conn-host trino --conn-port 8080
          --conn-schema iceberg --conn-login admin 2>/dev/null || true &&
        airflow webserver
      "
    ports:
      - "8082:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/webserver_config.py:/opt/airflow/webserver_config.py:ro
      - ./dbt:/opt/dbt
      - ../data:/opt/nxn/data:ro
      - ../:/opt/nxn:ro

  # ── 6. BI Dashboard ──────────────────────────────────────
  superset:
    image: apache/superset:3.1.3
    container_name: nxn-superset
    restart: unless-stopped
    depends_on:
      - trino
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-nxn-superset-secret-2026}
    ports:
      - "8088:8088"
    volumes:
      - superset_data:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    command: >
      bash -c "
        pip install trino sqlalchemy-trino authlib --quiet &&
        superset db upgrade &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088 --with-threads
      "

  # ── 7. Vector Store ──────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: nxn-chromadb
    restart: unless-stopped
    ports:
      - "8200:8000"
    volumes:
      - chroma_data:/chroma/chroma

  # ── 8. Portal (Nginx shell) ──────────────────────────────
  portal:
    image: nginx:alpine
    container_name: nxn-portal
    restart: unless-stopped
    depends_on:
      - ai_platform
    ports:
      - "80:80"
      - "9002:9002"
    volumes:
      - ./portal/index.html:/usr/share/nginx/html/index.html:ro
      - ./portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ── 9. AI Platform ───────────────────────────────────────
  ai_platform:
    build:
      context: ..
      dockerfile: ai_platform/Dockerfile
    container_name: nxn-ai-platform
    restart: unless-stopped
    depends_on:
      - trino
      - chromadb
      - keycloak
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DATA_DIR: /app/data
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:8090
      KEYCLOAK_REALM: nxn
      KEYCLOAK_CLIENT_ID: ai-platform
    ports:
      - "8300:8000"
    volumes:
      - ../data:/app/data:ro

volumes:
  minio_data:
  nessie_data:
  keycloak_data:
  postgres_data:
  superset_data:
  chroma_data:
